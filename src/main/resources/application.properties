quarkus.http.port=8080
quarkus.lambda.handler=io.quarkus.amazon.lambda.runtime.QuarkusStreamHandler
quarkus.package.type=fast-jar

# --- Database ---
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:smarttrack;DB_CLOSE_DELAY=-1
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.sql-load-script=import.sql

# --- CORS ---
quarkus.http.cors=true
quarkus.http.cors.origins=https://ezzium.fr,https://www.ezzium.fr,http://localhost:4200
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=Content-Type,Authorization

# --- DynamoDB ---
quarkus.dynamodb.devservices.enabled=false
quarkus.dynamodb.aws.region=eu-west-3