# --- Database ---
quarkus.datasource.db-kind=h2
quarkus.datasource.jdbc.url=jdbc:h2:mem:smarttrack;DB_CLOSE_DELAY=-1
quarkus.hibernate-orm.database.generation=drop-and-create
quarkus.hibernate-orm.sql-load-script=import.sql

# --- CORS (Nouveaux réglages Quarkus 3.x) ---
quarkus.http.cors=true
quarkus.http.cors.origins=http://localhost:4200,https://ezzium.fr,https://www.ezzium.fr
quarkus.http.cors.methods=GET,POST,PUT,DELETE,OPTIONS
quarkus.http.cors.headers=accept,authorization,content-type,x-requested-with
quarkus.http.cors.access-control-max-age=24h

# --- Quarkus Lambda ---
# Le handler est géré automatiquement par l'extension http
